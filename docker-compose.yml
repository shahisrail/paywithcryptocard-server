services:
  # MongoDB Database
  mongodb:
    image: mongo:8.0
    container_name: paywithcrypto-mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password123}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-paywithcrypto}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - paywithcrypto-network

  # Backend API Server
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: paywithcrypto-backend
    restart: always
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-5000}
      MONGODB_URI: mongodb://${MONGO_USERNAME:-admin}:${MONGO_PASSWORD:-password123}@mongodb:27017/${MONGO_DATABASE:-paywithcrypto}?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE: ${JWT_EXPIRE:-7d}
      FRONTEND_URL: ${FRONTEND_URL}
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    networks:
      - paywithcrypto-network

volumes:
  mongodb_data:
    driver: local

networks:
  paywithcrypto-network:
    driver: bridge